  <text x="959" y="182" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#185fa5">forge-persona</text>
  <text x="866" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">铸造人格</text>
  <text x="866" y="241" text-anchor="middle" font-size="11" fill="#3d3d3a">把同类高光熔成一个会用</text>
  <text x="866" y="255" text-anchor="middle" font-size="11" fill="#3d3d3a">"我"说话的角色 (v1)。</text>
  <line x1="776" y1="275" x2="956" y2="275" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="866" y="294" text-anchor="middle" font-size="10" fill="#a14545">❌ 第三人称 ("这个 persona…")</text>
  <text x="866" y="310" text-anchor="middle" font-size="10" fill="#a14545">❌ 编造原话引用</text>
  <text x="866" y="326" text-anchor="middle" font-size="10" fill="#a14545">❌ 万能修辞 ("多维思考")</text>
</g>
<line x1="976" y1="250" x2="1008" y2="250" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

<!-- P9 refine-persona -->
<g>
  <rect x="1008" y="160" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="1008" y="160" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="1026" y="182" font-size="13" font-weight="700" fill="#0c447c">P9 升级</text>
  <text x="1211" y="182" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#185fa5">refine-persona</text>
  <text x="1118" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">人格升级</text>
  <text x="1118" y="241" text-anchor="middle" font-size="11" fill="#3d3d3a">已有 persona + 新高光 →</text>
  <text x="1118" y="255" text-anchor="middle" font-size="11" fill="#3d3d3a">v1 升 v2 / v3 (不重建)。</text>
  <line x1="1028" y1="275" x2="1208" y2="275" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="1118" y="294" text-anchor="middle" font-size="10" fill="#1f7a47">✓ reinforce 加固</text>
  <text x="1118" y="310" text-anchor="middle" font-size="10" fill="#1f7a47">✓ enrich 丰富</text>
  <text x="1118" y="326" text-anchor="middle" font-size="10" fill="#1f7a47">✓ contradict 标分支</text>
</g>


<!-- ════════════════════════════════════════════════════ -->
<!-- 链路 2 · CONVENE                                      -->
<!-- ════════════════════════════════════════════════════ -->

<g>
  <rect x="60" y="395" width="1160" height="38" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="78" y="420" font-size="15" font-weight="700" fill="#085041">链路 2 · CONVENE · 议会</text>
  <text x="280" y="420" font-size="12" fill="#3d3d3a">召集 persona 制造对撞, 留下分歧</text>
  <text x="1202" y="420" text-anchor="end" font-size="11" fill="#6b6b66" font-style="italic">读取 self/ + mentors/ + roles/</text>
</g>

<!-- input chip -->
<g>
  <rect x="80" y="465" width="140" height="50" rx="8" fill="#fafbfc" stroke="#cdd6df"/>
  <text x="150" y="490" text-anchor="middle" font-size="11" fill="#5d5d58">输入</text>
  <text x="150" y="507" text-anchor="middle" font-size="13" font-weight="600" fill="#222">你的真问题</text>
</g>
<line x1="220" y1="490" x2="252" y2="490" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

<!-- P3 summon -->
<g>
  <rect x="252" y="455" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="252" y="455" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="270" y="477" font-size="13" font-weight="700" fill="#085041">P3 召集</text>
  <text x="455" y="477" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#0f6e56">summon</text>
  <text x="362" y="513" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">召集人</text>
  <text x="362" y="536" text-anchor="middle" font-size="11" fill="#3d3d3a">从全库 N 个里选 3-5 个上桌。</text>
  <text x="362" y="550" text-anchor="middle" font-size="11" fill="#3d3d3a">代码层 + LLM 层双重保护。</text>
  <line x1="272" y1="570" x2="452" y2="570" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="362" y="589" text-anchor="middle" font-size="10" fill="#085041">✓ ≥1 self + ≥1 mentor + ≥1 role</text>
  <text x="362" y="605" text-anchor="middle" font-size="10" fill="#085041">✓ devils-advocate 永远在席</text>
  <text x="362" y="621" text-anchor="middle" font-size="10" fill="#a14545">❌ 单视角议会 = 回音室</text>
</g>
<line x1="472" y1="545" x2="504" y2="545" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

<!-- P4 statement -->
<g>
  <rect x="504" y="455" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="504" y="455" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="522" y="477" font-size="13" font-weight="700" fill="#085041">P4 陈述 ⏵⏵ 并行</text>
  <text x="707" y="477" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#0f6e56">statement</text>
  <text x="614" y="513" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">独立陈述</text>
  <text x="614" y="536" text-anchor="middle" font-size="11" fill="#3d3d3a">N 个 persona 同时各自闷头</text>
  <text x="614" y="550" text-anchor="middle" font-size="11" fill="#3d3d3a">思考, 不许偷看其他人。</text>
  <line x1="524" y1="570" x2="704" y2="570" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="614" y="589" text-anchor="middle" font-size="10" fill="#a14545">❌ 串供 (看其他人发言)</text>
  <text x="614" y="605" text-anchor="middle" font-size="10" fill="#a14545">❌ 客套 ("这是好问题")</text>
  <text x="614" y="621" text-anchor="middle" font-size="10" fill="#a14545">❌ 既要又要 (留给 P6)</text>
</g>
<line x1="724" y1="545" x2="756" y2="545" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

<!-- P5 cross-exam -->
<g>
  <rect x="756" y="455" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="756" y="455" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="774" y="477" font-size="13" font-weight="700" fill="#085041">P5 质疑 ⏵⏵ 并行</text>
  <text x="959" y="477" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#0f6e56">cross-exam</text>
  <text x="866" y="513" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">互相质疑</text>
  <text x="866" y="536" text-anchor="middle" font-size="11" fill="#3d3d3a">每人挑别人的盲点, 提一个</text>
  <text x="866" y="550" text-anchor="middle" font-size="11" fill="#3d3d3a">对方必须回答的锋利问题。</text>
  <line x1="776" y1="570" x2="956" y2="570" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="866" y="589" text-anchor="middle" font-size="10" fill="#a14545">❌ "其实他说得很对…"</text>
  <text x="866" y="605" text-anchor="middle" font-size="10" fill="#a14545">❌ "应该更全面考虑"</text>
  <text x="866" y="621" text-anchor="middle" font-size="10" fill="#a14545">❌ 没有具体抓手</text>
</g>
<line x1="976" y1="545" x2="1008" y2="545" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

<!-- P6 synthesis -->
<g>
  <rect x="1008" y="455" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="1008" y="455" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="1026" y="477" font-size="13" font-weight="700" fill="#085041">P6 综合 (JSON)</text>
  <text x="1211" y="477" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#0f6e56">synthesis</text>
  <text x="1118" y="513" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">综合裁定</text>
  <text x="1118" y="536" text-anchor="middle" font-size="11" fill="#3d3d3a">不属于任何 persona 的"综合</text>
  <text x="1118" y="550" text-anchor="middle" font-size="11" fill="#3d3d3a">者", 留下分歧, 不和稀泥。</text>
  <line x1="1028" y1="570" x2="1208" y2="570" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="1118" y="589" text-anchor="middle" font-size="10" fill="#085041">✓ 共识 ✓ 分歧 (谁⇆谁)</text>
  <text x="1118" y="605" text-anchor="middle" font-size="10" fill="#085041">✓ 决议 ✓ 元洞察</text>
  <text x="1118" y="621" text-anchor="middle" font-size="10" fill="#a14545">❌ "综上所述" "既要又要"</text>
</g>


<!-- ════════════════════════════════════════════════════ -->
<!-- 链路 3 · EVOLVE                                       -->
<!-- ════════════════════════════════════════════════════ -->

<g>
  <rect x="60" y="690" width="1160" height="38" rx="6" fill="#fbf1e1" stroke="#a06820" stroke-width="0.5"/>
  <text x="78" y="715" font-size="15" font-weight="700" fill="#7a4f15">链路 3 · EVOLVE · 进化</text>
  <text x="280" y="715" font-size="12" fill="#3d3d3a">让 persona 库不腐烂, 形成复利</text>
  <text x="1202" y="715" text-anchor="end" font-size="11" fill="#6b6b66" font-style="italic">归档老的, 升级新的</text>
</g>

<!-- input chip -->
<g>
  <rect x="80" y="760" width="200" height="50" rx="8" fill="#fafbfc" stroke="#cdd6df"/>
  <text x="180" y="785" text-anchor="middle" font-size="11" fill="#5d5d58">输入</text>
  <text x="180" y="802" text-anchor="middle" font-size="13" font-weight="600" fill="#222">两个看似很像的 persona</text>
</g>
<line x1="280" y1="785" x2="312" y2="785" stroke="#a06820" stroke-width="1.6" marker-end="url(#arr-amber)"/>

<!-- P7 merge-check -->
<g>
  <rect x="312" y="750" width="280" height="180" rx="10" fill="#fff" stroke="#a06820" stroke-width="1.4"/>
  <rect x="312" y="750" width="280" height="32" rx="10" fill="#fbe8c8" stroke="#a06820" stroke-width="1.4"/>
  <text x="330" y="772" font-size="13" font-weight="700" fill="#7a4f15">P7 预检</text>
  <text x="575" y="772" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#a06820">merge-check</text>
  <text x="452" y="808" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">融合预检</text>
  <text x="452" y="831" text-anchor="middle" font-size="11" fill="#3d3d3a">从严判断: 它俩是不是本质上是同一个人?</text>
  <text x="452" y="847" text-anchor="middle" font-size="11" fill="#3d3d3a">看触发场景 / 思考路径 / 典型片段是否同构。</text>
  <line x1="332" y1="867" x2="572" y2="867" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="452" y="886" text-anchor="middle" font-size="10" fill="#1f7a47">overlap 0.85+ → 该合</text>
  <text x="452" y="902" text-anchor="middle" font-size="10" fill="#7a4f15">overlap 0.6-0.85 → 边缘 (用户决定)</text>
  <text x="452" y="918" text-anchor="middle" font-size="10" fill="#a14545">overlap &lt;0.6 → 别合 (保留独立视角)</text>
</g>
<line x1="592" y1="840" x2="624" y2="840" stroke="#a06820" stroke-width="1.6" marker-end="url(#arr-amber)"/>
<text x="608" y="828" text-anchor="middle" font-size="9" fill="#7a4f15">≥0.85</text>

<!-- P8 synthesize-merge -->
<g>
  <rect x="624" y="750" width="280" height="180" rx="10" fill="#fff" stroke="#a06820" stroke-width="1.4"/>
  <rect x="624" y="750" width="280" height="32" rx="10" fill="#fbe8c8" stroke="#a06820" stroke-width="1.4"/>
  <text x="642" y="772" font-size="13" font-weight="700" fill="#7a4f15">P8 融合</text>
  <text x="887" y="772" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#a06820">synthesize-merge</text>
  <text x="764" y="808" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">融合执行</text>
  <text x="764" y="831" text-anchor="middle" font-size="11" fill="#3d3d3a">不是平均, 是各取最锋利, 删重复。</text>
  <text x="764" y="847" text-anchor="middle" font-size="11" fill="#3d3d3a">老的归档到 _merged/, 新的换名上线。</text>
  <line x1="644" y1="867" x2="884" y2="867" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="764" y="886" text-anchor="middle" font-size="10" fill="#1f7a47">✓ 典型片段从两源各取 ≥1 条原话</text>
  <text x="764" y="902" text-anchor="middle" font-size="10" fill="#a14545">❌ 平均化合并 (失去锋利感)</text>
  <text x="764" y="918" text-anchor="middle" font-size="10" fill="#a14545">❌ 编造新引用</text>
</g>

<!-- ════════════════════════════════════════════════════ -->
<!-- 底部观察                                              -->
<!-- ════════════════════════════════════════════════════ -->

<g>
