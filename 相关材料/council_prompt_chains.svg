<svg width="100%" viewBox="0 0 1280 1180" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
<title>Council Prompt 链路 · 三链路十节点</title>
<desc>Distill 蒸馏 / Convene 议会 / Evolve 进化 三条 prompt 链路, 每个节点的职能 + 硬性拒绝清单</desc>

<defs>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a06820" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ─── Title ─── -->
<text x="640" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#141413">Council Prompt 链路</text>
<text x="640" y="68" text-anchor="middle" font-size="13" fill="#5d5d58">三链路 · 十节点 · 每个节点都有一道明确的 nonsense 守门员</text>

<!-- ════════════════════════════════════════════════════ -->
<!-- 链路 1 · DISTILL                                      -->
<!-- ════════════════════════════════════════════════════ -->

<!-- chain header -->
<g>
  <rect x="60" y="100" width="1160" height="38" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="78" y="125" font-size="15" font-weight="700" fill="#0c447c">链路 1 · DISTILL · 蒸馏</text>
  <text x="280" y="125" font-size="12" fill="#3d3d3a">把对话变成"会说话的你"</text>
  <text x="1202" y="125" text-anchor="end" font-size="11" fill="#6b6b66" font-style="italic">写入 self/</text>
</g>

<!-- input chip -->
<g>
  <rect x="80" y="170" width="140" height="50" rx="8" fill="#fafbfc" stroke="#cdd6df"/>
  <text x="150" y="195" text-anchor="middle" font-size="11" fill="#5d5d58">输入</text>
  <text x="150" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#222">原始对话.md</text>
</g>
<line x1="220" y1="195" x2="252" y2="195" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

<!-- P10 should-capture (gate) -->
<g>
  <rect x="252" y="160" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="252" y="160" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="270" y="182" font-size="13" font-weight="700" fill="#0c447c">P10 守门员</text>
  <text x="455" y="182" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#185fa5">should-capture</text>
  <text x="362" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">该不该收?</text>
  <text x="362" y="241" text-anchor="middle" font-size="11" fill="#3d3d3a">问一句: 这段对话有"用户思</text>
  <text x="362" y="255" text-anchor="middle" font-size="11" fill="#3d3d3a">考瞬间"吗? 没有就不收。</text>
  <line x1="272" y1="275" x2="452" y2="275" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="362" y="294" text-anchor="middle" font-size="10" fill="#a14545">❌ 让 AI 写代码 / 翻译</text>
  <text x="362" y="310" text-anchor="middle" font-size="10" fill="#a14545">❌ 用户全程点头</text>
  <text x="362" y="326" text-anchor="middle" font-size="10" fill="#a14545">❌ 调试 / 测试 prompt</text>
</g>
<line x1="472" y1="250" x2="504" y2="250" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

<!-- P1 identify-highlights -->
<g>
  <rect x="504" y="160" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="504" y="160" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="522" y="182" font-size="13" font-weight="700" fill="#0c447c">P1 抠原话</text>
  <text x="707" y="182" text-anchor="end" font-size="10" font-family="ui-monospace,monospace" fill="#185fa5">identify-highlights</text>
  <text x="614" y="218" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">找你的高光</text>
  <text x="614" y="241" text-anchor="middle" font-size="11" fill="#3d3d3a">从一坨对话里抠出 3-5 句</text>
  <text x="614" y="255" text-anchor="middle" font-size="11" fill="#3d3d3a">"真正属于你的话"。</text>
  <line x1="524" y1="275" x2="704" y2="275" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="614" y="294" text-anchor="middle" font-size="10" fill="#a14545">❌ 用户点头同意 AI</text>
  <text x="614" y="310" text-anchor="middle" font-size="10" fill="#a14545">❌ 同义反复 ("用第一性原理")</text>
  <text x="614" y="326" text-anchor="middle" font-size="10" fill="#a14545">❌ 原话无法逐字定位</text>
</g>
<line x1="724" y1="250" x2="756" y2="250" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

<!-- P2 forge-persona -->
<g>
  <rect x="756" y="160" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="756" y="160" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
