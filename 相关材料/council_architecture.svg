<svg width="100%" viewBox="0 0 1200 920" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
<title>Council 系统架构 · 三链路视图</title>
<desc>A 摄入 / B 议会 / C 反哺 三条数据链路, 全部围绕中央 personas/ 库流转</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a06820" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ─── Title ─── -->
<text x="600" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#141413">Council 系统架构 · 三链路视图</text>
<text x="600" y="62" text-anchor="middle" font-size="12" fill="#3d3d3a">捕获你的思考 · 召集多视角议会 · 反哺让 persona 越用越厚</text>

<!-- ─── Pipeline header bands ─── -->
<g>
  <rect x="60"   y="90" width="340" height="36" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="230"  y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#0c447c">链路 A · 摄入</text>
  <text x="230"  y="146" text-anchor="middle" font-size="11" fill="#6b6b66">把你的对话变成可检索的 persona</text>

  <rect x="430"  y="90" width="340" height="36" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="600"  y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">链路 B · 议会</text>
  <text x="600"  y="146" text-anchor="middle" font-size="11" fill="#6b6b66">召集 persona 围绕一个真问题辩论</text>

  <rect x="800"  y="90" width="340" height="36" rx="6" fill="#fbf1e1" stroke="#a06820" stroke-width="0.5"/>
  <text x="970"  y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#7a4f15"> 链路 C · 反哺</text>
  <text x="970"  y="146" text-anchor="middle" font-size="11" fill="#6b6b66">用新数据深化已有 persona, 形成复利</text>
</g>

<!-- ─── Pipeline A nodes ─── -->
<g>
  <!-- input -->
  <rect x="120" y="170" width="220" height="44" rx="6" fill="#fff" stroke="#185fa5" stroke-width="0.6"/>
  <text x="230" y="190" text-anchor="middle" font-size="12" font-weight="500" fill="#0c447c">.md 对话原文</text>
  <text x="230" y="206" text-anchor="middle" font-size="11" fill="#6b6b66">Claude 导出 / 剪贴板 / 文件</text>

  <line x1="230" y1="214" x2="230" y2="240" stroke="#185fa5" stroke-width="1" marker-end="url(#arr)"/>

  <!-- capture -->
  <rect x="120" y="240" width="220" height="60" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.6"/>
  <text x="230" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#0c447c">council capture</text>
  <text x="230" y="278" text-anchor="middle" font-size="11" fill="#3d3d3a">T0 LLM 生成标题 (前 4000 字)</text>
  <text x="230" y="294" text-anchor="middle" font-size="11" fill="#3d3d3a">写入 sessions/&lt;id&gt;.md</text>

  <line x1="230" y1="300" x2="230" y2="326" stroke="#185fa5" stroke-width="1" marker-end="url(#arr)"/>

  <!-- distill -->
  <rect x="120" y="326" width="220" height="76" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.6"/>
  <text x="230" y="346" text-anchor="middle" font-size="13" font-weight="600" fill="#0c447c">council distill</text>
  <text x="230" y="364" text-anchor="middle" font-size="11" fill="#3d3d3a">P1 识别高光 (3-5 个)</text>
  <text x="230" y="380" text-anchor="middle" font-size="11" fill="#3d3d3a">P2 按 type 聚类 → forge persona</text>
  <text x="230" y="396" text-anchor="middle" font-size="10" fill="#a06820">已有 type? → 跳过, 提示用 refine ↘</text>

  <line x1="230" y1="402" x2="230" y2="430" stroke="#185fa5" stroke-width="1" marker-end="url(#arr)"/>

  <!-- output -->
  <rect x="120" y="430" width="220" height="60" rx="6" fill="#fff" stroke="#185fa5" stroke-width="0.6"/>
  <text x="230" y="450" text-anchor="middle" font-size="12" font-weight="500" fill="#0c447c">skills/ + personas/self/</text>
  <text x="230" y="468" text-anchor="middle" font-size="11" fill="#6b6b66">原子高光 + 锻造的思考人格</text>
  <text x="230" y="482" text-anchor="middle" font-size="10" fill="#3d3d3a">每个 persona 第一人称发声</text>
</g>

<!-- ─── Pipeline B nodes ─── -->
<g>
  <!-- input -->
  <rect x="490" y="170" width="220" height="44" rx="6" fill="#fff" stroke="#0f6e56" stroke-width="0.6"/>
  <text x="600" y="190" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">一个真问题</text>
  <text x="600" y="206" text-anchor="middle" font-size="11" fill="#6b6b66">"我应该全职做 Council 吗"</text>

  <line x1="600" y1="214" x2="600" y2="240" stroke="#0f6e56" stroke-width="1" marker-end="url(#arr)"/>

  <!-- summon -->
  <rect x="490" y="240" width="220" height="58" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.6"/>
  <text x="600" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">P3 summon · 召集</text>
  <text x="600" y="278" text-anchor="middle" font-size="11" fill="#3d3d3a">从 personas/ 选 3-5 个</text>
  <text x="600" y="293" text-anchor="middle" font-size="11" fill="#3d3d3a">硬约束: ≥1 self ≥1 mentor ≥1 role</text>

  <line x1="600" y1="298" x2="600" y2="324" stroke="#0f6e56" stroke-width="1" marker-end="url(#arr)"/>

  <!-- statement (parallel) -->
  <rect x="490" y="324" width="220" height="58" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.6"/>
  <text x="600" y="344" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">P4 statement · 并行表态</text>
  <text x="600" y="362" text-anchor="middle" font-size="11" fill="#3d3d3a">每个 persona 独立发言</text>
  <text x="600" y="377" text-anchor="middle" font-size="11" fill="#3d3d3a">判断 / 反流行看法 / 建议</text>

  <line x1="600" y1="382" x2="600" y2="408" stroke="#0f6e56" stroke-width="1" marker-end="url(#arr)"/>

  <!-- cross-exam -->
  <rect x="490" y="408" width="220" height="58" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.6"/>
  <text x="600" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">P5 cross-exam · 互相质疑</text>
  <text x="600" y="446" text-anchor="middle" font-size="11" fill="#3d3d3a">每人对其他人挑刺</text>
  <text x="600" y="461" text-anchor="middle" font-size="11" fill="#a06820">★ 把 LLM 从客套挤到对抗</text>

  <line x1="600" y1="466" x2="600" y2="492" stroke="#0f6e56" stroke-width="1" marker-end="url(#arr)"/>

  <!-- synthesis -->
  <rect x="490" y="492" width="220" height="58" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.6"/>
  <text x="600" y="512" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">P6 synthesis · 综合</text>
  <text x="600" y="530" text-anchor="middle" font-size="11" fill="#3d3d3a">共识 / 仍存分歧 / 今天必须决定</text>
  <text x="600" y="545" text-anchor="middle" font-size="11" fill="#3d3d3a">+ 本次暴露的新思考模式</text>

  <line x1="600" y1="550" x2="600" y2="578" stroke="#0f6e56" stroke-width="1" marker-end="url(#arr)"/>

  <!-- output -->
  <rect x="490" y="578" width="220" height="42" rx="6" fill="#fff" stroke="#0f6e56" stroke-width="0.6"/>
  <text x="600" y="598" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">transcripts/&lt;id&gt;.md</text>
  <text x="600" y="613" text-anchor="middle" font-size="11" fill="#6b6b66">羊皮纸结构 · 可追溯</text>
</g>

<!-- ─── Pipeline C nodes ─── -->
<g>
  <!-- input: feedback OR new highlights -->
  <rect x="860" y="170" width="220" height="44" rx="6" fill="#fff" stroke="#a06820" stroke-width="0.6"/>
  <text x="970" y="190" text-anchor="middle" font-size="12" font-weight="500" fill="#7a4f15">触发: 新 highlight 或 feedback</text>
  <text x="970" y="206" text-anchor="middle" font-size="11" fill="#6b6b66">捕获更多对话 / 议会打分</text>

  <line x1="970" y1="214" x2="970" y2="240" stroke="#a06820" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- feedback -->
  <rect x="860" y="240" width="220" height="50" rx="6" fill="#fbf1e1" stroke="#a06820" stroke-width="0.6"/>
  <text x="970" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#7a4f15">council feedback</text>
  <text x="970" y="278" text-anchor="middle" font-size="11" fill="#3d3d3a">helpful / generic / off-target → 打分</text>

  <line x1="970" y1="290" x2="970" y2="316" stroke="#a06820" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- evolve -->
  <rect x="860" y="316" width="220" height="50" rx="6" fill="#fbf1e1" stroke="#a06820" stroke-width="0.6"/>
  <text x="970" y="336" text-anchor="middle" font-size="13" font-weight="600" fill="#7a4f15">council evolve</text>
  <text x="970" y="354" text-anchor="middle" font-size="11" fill="#3d3d3a">低分 → stale 归档 / 高重叠 → 建议 merge</text>

  <line x1="970" y1="366" x2="970" y2="392" stroke="#a06820" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- refine ★ -->
  <rect x="860" y="392" width="220" height="74" rx="6" fill="#fbf1e1" stroke="#a06820" stroke-width="1.2"/>
  <text x="970" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4f15">council refine ★</text>
  <text x="970" y="430" text-anchor="middle" font-size="11" fill="#3d3d3a">P9 三档判定:</text>
  <text x="970" y="446" text-anchor="middle" font-size="11" fill="#3d3d3a">💪 reinforce  🌱 enrich  ⚡ contradict</text>
  <text x="970" y="461" text-anchor="middle" font-size="10" fill="#7a4f15">contradict 写 -draft 不污染主文件</text>

  <line x1="970" y1="466" x2="970" y2="492" stroke="#a06820" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- output -->
  <rect x="860" y="492" width="220" height="58" rx="6" fill="#fff" stroke="#a06820" stroke-width="0.6"/>
  <text x="970" y="512" text-anchor="middle" font-size="12" font-weight="500" fill="#7a4f15">persona v → v+1</text>
  <text x="970" y="528" text-anchor="middle" font-size="11" fill="#6b6b66">同一 persona 越用越厚</text>
  <text x="970" y="543" text-anchor="middle" font-size="10" fill="#3d3d3a">这是 Council 复利的核心</text>
</g>

<!-- ─── Central data layer (personas) ─── -->
<g>
  <rect x="60" y="660" width="1080" height="160" rx="10" fill="#faf9f6" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="600" y="685" text-anchor="middle" font-size="13" font-weight="600" fill="#3d3d3a">中央数据层 · ~/.council/</text>
  <text x="600" y="703" text-anchor="middle" font-size="11" fill="#6b6b66">所有命令最终都读写这些目录, 三链路在 personas/ 处汇合</text>

  <!-- dirs as smaller chips -->
  <g font-size="11" fill="#3d3d3a">
    <rect x="100" y="725" width="135" height="64" rx="6" fill="#fff" stroke="#185fa5" stroke-width="0.5"/>
    <text x="167" y="746" text-anchor="middle" font-weight="600" fill="#0c447c">sessions/</text>
    <text x="167" y="764" text-anchor="middle" font-size="10" fill="#6b6b66">原始对话 + 标题</text>
    <text x="167" y="778" text-anchor="middle" font-size="10" fill="#6b6b66">capture 写入</text>

    <rect x="250" y="725" width="135" height="64" rx="6" fill="#fff" stroke="#185fa5" stroke-width="0.5"/>
    <text x="317" y="746" text-anchor="middle" font-weight="600" fill="#0c447c">skills/</text>
    <text x="317" y="764" text-anchor="middle" font-size="10" fill="#6b6b66">原子高光 (highlights)</text>
    <text x="317" y="778" text-anchor="middle" font-size="10" fill="#6b6b66">distill 写入</text>

    <rect x="400" y="725" width="200" height="64" rx="6" fill="#fffaf0" stroke="#a06820" stroke-width="1.2"/>
    <text x="500" y="746" text-anchor="middle" font-weight="700" fill="#7a4f15">personas/</text>
    <text x="500" y="762" text-anchor="middle" font-size="10" fill="#3d3d3a">self · mentors · roles</text>
    <text x="500" y="776" text-anchor="middle" font-size="10" fill="#3d3d3a">_merged · _stale</text>
    <text x="500" y="790" text-anchor="middle" font-size="9.5" fill="#a06820">三链路汇合的中心数据</text>

    <rect x="615" y="725" width="135" height="64" rx="6" fill="#fff" stroke="#0f6e56" stroke-width="0.5"/>
    <text x="682" y="746" text-anchor="middle" font-weight="600" fill="#085041">transcripts/</text>
    <text x="682" y="764" text-anchor="middle" font-size="10" fill="#6b6b66">议会原文 + 召集理由</text>
    <text x="682" y="778" text-anchor="middle" font-size="10" fill="#6b6b66">convene 写入</text>

    <rect x="765" y="725" width="135" height="64" rx="6" fill="#fff" stroke="#888780" stroke-width="0.5"/>
    <text x="832" y="746" text-anchor="middle" font-weight="600" fill="#3d3d3a">.state/</text>
    <text x="832" y="764" text-anchor="middle" font-size="10" fill="#6b6b66">distilled.json</text>
    <text x="832" y="778" text-anchor="middle" font-size="10" fill="#6b6b66">高光-persona 索引</text>

    <rect x="915" y="725" width="135" height="64" rx="6" fill="#fff" stroke="#888780" stroke-width="0.5"/>
    <text x="982" y="746" text-anchor="middle" font-weight="600" fill="#3d3d3a">identity.md</text>
    <text x="982" y="764" text-anchor="middle" font-size="10" fill="#6b6b66">你是谁</text>
    <text x="982" y="778" text-anchor="middle" font-size="10" fill="#6b6b66">所有 prompt 注入</text>
  </g>
</g>

<!-- ─── Cross-pipeline arrows ─── -->
<!-- A → personas/ (forge output) -->
<path d="M 230 490 L 230 640 Q 230 660 250 660 L 480 660 Q 500 660 500 680 L 500 723" fill="none" stroke="#185fa5" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- personas/ → B (summon reads) -->
<path d="M 500 723 L 500 680 Q 500 660 520 660 L 600 660 L 600 615" fill="none" stroke="#0f6e56" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- transcripts → C feedback (feedback reads transcript) -->
<path d="M 682 723 L 682 700 Q 682 670 720 670 L 870 670 Q 900 670 900 650 L 900 250" fill="none" stroke="#a06820" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>

<!-- C refine → personas/ (writes back) -->
<path d="M 970 550 L 970 640 Q 970 660 950 660 L 530 660 Q 510 660 510 680 L 510 723" fill="none" stroke="#a06820" stroke-width="1.2" marker-end="url(#arr-amber)"/>

<!-- distill A 检测到重复 → 提示用 refine -->
<path d="M 340 365 Q 600 320 850 415" fill="none" stroke="#a06820" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.5"/>
<text x="595" y="335" text-anchor="middle" font-size="9.5" fill="#a06820" opacity="0.85">检测到已有 type → 跳 refine</text>

<!-- ─── Legend ─── -->
<g font-size="10" fill="#6b6b66">
  <rect x="60" y="850" width="1080" height="50" rx="6" fill="#faf9f6" stroke="#d8d6cf" stroke-width="0.5"/>
  <text x="80" y="870" font-weight="600" fill="#3d3d3a">图例</text>
  <line x1="120" y1="867" x2="160" y2="867" stroke="#185fa5" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="170" y="871">数据流 (写入)</text>
  <line x1="270" y1="867" x2="310" y2="867" stroke="#0f6e56" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="320" y="871">读取 / 引用</text>
  <line x1="410" y1="867" x2="450" y2="867" stroke="#a06820" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <text x="460" y="871">反哺 (写回更新)</text>
  <text x="600" y="871">★ = 链路 C 新增 (council refine)</text>
  <text x="850" y="871" fill="#a06820">↘ 虚线提示 = distill 自动转向 refine</text>

  <text x="80" y="888" fill="#888780">所有节点跑同一个模型 (Haiku 4.5), 多视角靠 prompt 切换 — 不是真"多模型议会"。</text>
</g>

</svg>
