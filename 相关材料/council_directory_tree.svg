  <text x="430" y="1018" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">浏览器圆桌前端 (本次 demo 不用)</text>
  <text x="80" y="1038">📁 相关材料/</text>
  <text x="430" y="1038" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">演讲脚本 / 战略地图 / 架构图</text>
</g>

