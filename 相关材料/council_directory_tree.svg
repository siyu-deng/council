  <text x="430" y="902" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">浏览器圆桌 live server (--watch 用)</text>

  <!-- seeds/ -->
  <text x="80" y="932">📁 seeds/</text>
  <text x="430" y="932" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">init 时拷给用户的种子文件</text>
