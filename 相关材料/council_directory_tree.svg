  <!-- src/ -->
  <text x="80" y="210">📁 src/</text>

  <!-- src/commands/ -->
  <text x="120" y="232">├── 📁 commands/</text>
  <text x="430" y="232" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">每个用户命令的入口编排逻辑</text>
  <g font-size="11" fill="#3d3d3a">
    <text x="160" y="252">│   ├── init.ts</text>
    <text x="160" y="270">│   ├── capture.ts</text>
    <text x="160" y="288">│   ├── distill.ts</text>
    <text x="160" y="306">│   ├── convene.ts</text>
    <text x="160" y="324">│   ├── persona.ts</text>
    <text x="160" y="342">│   ├── feedback.ts</text>
    <text x="160" y="360">│   ├── evolve.ts</text>
    <text x="160" y="378">│   ├── merge.ts</text>
    <text x="160" y="396" font-weight="700" fill="#7a4f15">│   ├── refine.ts  ★</text>
    <text x="430" y="396" font-size="10" font-weight="600" fill="#a06820" font-family="'Anthropic Sans', sans-serif" text-anchor="end">链路 C 反哺 · 新增</text>
    <text x="160" y="414">│   ├── export.ts</text>
    <text x="160" y="432">│   └── serve.ts</text>
    <text x="430" y="432" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">MCP server (导出后给 Claude Desktop 用)</text>
  </g>

