  <text x="120" y="988" font-size="11" fill="#3d3d3a">└── personas/{mentors, roles}/</text>
  <text x="430" y="988" font-size="10" fill="#6b6b66" font-family="'Anthropic Sans', sans-serif" text-anchor="end">jobs/munger/naval/devils-advocate/first-customer</text>

