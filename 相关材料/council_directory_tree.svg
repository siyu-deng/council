<svg width="100%" viewBox="0 0 1200 1080" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
<title>Council 目录结构 · 代码 + 数据</title>
<desc>左侧项目仓库 (代码), 右侧用户运行时 (数据), 通过 council 命令读写</desc>

<!-- ─── Title ─── -->
<text x="600" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#141413">Council 目录结构</text>
<text x="600" y="62" text-anchor="middle" font-size="12" fill="#3d3d3a">左 = 代码仓库 · 右 = 你的数据 · 通过 council 命令穿越两边</text>

<!-- ─── Column headers ─── -->
<g>
  <rect x="60"  y="90" width="540" height="36" rx="6" fill="#f4f6fa" stroke="#185fa5" stroke-width="0.5"/>
  <text x="80"  y="113" font-size="13" font-weight="600" fill="#0c447c">📦  ~/Desktop/councli/</text>
  <text x="430" y="113" font-size="11" fill="#6b6b66" text-anchor="end">项目代码 · git 跟踪</text>

  <rect x="620" y="90" width="540" height="36" rx="6" fill="#fbf8f1" stroke="#a06820" stroke-width="0.5"/>
  <text x="640" y="113" font-size="13" font-weight="600" fill="#7a4f15">🏠  ~/.council/</text>
  <text x="980" y="113" font-size="11" fill="#6b6b66" text-anchor="end">你的数据 · git 不跟踪</text>
</g>

