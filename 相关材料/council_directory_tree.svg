    <text x="160" y="632">│   ├── P3-summon.ts</text>
    <text x="160" y="650">│   ├── P4-statement.ts</text>
    <text x="160" y="668">│   ├── P5-cross-exam.ts</text>
    <text x="160" y="686">│   ├── P6-synthesis.ts</text>
