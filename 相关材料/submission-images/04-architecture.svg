<svg width="100%" viewBox="0 0 1240 1754" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', system-ui, sans-serif">
<title>Council 系统架构 · 数据/运行时/视图三层解耦</title>

<defs>
  <marker id="arr-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b6b66" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="1240" height="1754" fill="#fafaf7"/>

<!-- Header -->
<g>
  <text x="80" y="100" font-size="34" font-weight="700" fill="#141413">系统架构 · 三层解耦</text>
  <text x="80" y="138" font-size="15" fill="#5d5d58">数据层一致, 表面层各自演化 — CLI 是 Git, 网页是 GitHub, MCP 是协议层。</text>
  <line x1="80" y1="160" x2="1160" y2="160" stroke="#141413" stroke-width="1.5"/>
</g>

<!-- 视图层 -->
<g transform="translate(80, 200)">
  <rect x="0" y="0" width="1080" height="240" rx="12" fill="#fbf1e1" stroke="#a06820" stroke-width="1"/>
  <text x="20" y="35" font-size="13" font-weight="700" fill="#7a4f15" letter-spacing="3">VIEW · 视图层 · 三张嘴</text>
  <text x="20" y="58" font-size="11" fill="#6b6259">同一份事件流, 三种渲染。互不知道对方存在。</text>

  <!-- CLI -->
  <g>
    <rect x="30" y="80" width="320" height="140" rx="10" fill="#fff" stroke="#a06820" stroke-width="1"/>
    <text x="190" y="115" text-anchor="middle" font-size="20" font-weight="700" fill="#5e3d10">CLI 终端</text>
    <text x="190" y="138" text-anchor="middle" font-size="12" fill="#7a4f15">stderr 流式渲染</text>
    <line x1="60" y1="155" x2="320" y2="155" stroke="#fbe8c8"/>
    <text x="190" y="178" text-anchor="middle" font-size="11" fill="#5d5d58">council convene "..."</text>
    <text x="190" y="195" text-anchor="middle" font-size="11" fill="#888" font-style="italic">给开发者的本地仪式</text>
  </g>

  <!-- Web -->
  <g>
    <rect x="380" y="80" width="320" height="140" rx="10" fill="#fff" stroke="#a06820" stroke-width="2"/>
    <text x="540" y="115" text-anchor="middle" font-size="20" font-weight="700" fill="#5e3d10">Web 圆桌</text>
    <text x="540" y="138" text-anchor="middle" font-size="12" fill="#7a4f15">Vite + React + WS</text>
    <line x1="410" y1="155" x2="670" y2="155" stroke="#fbe8c8"/>
    <text x="540" y="178" text-anchor="middle" font-size="11" fill="#5d5d58">--watch 自动弹浏览器</text>
    <text x="540" y="195" text-anchor="middle" font-size="11" fill="#888" font-style="italic">椅子亮起 · 决议卡浮现</text>
  </g>

  <!-- MCP -->
  <g>
    <rect x="730" y="80" width="320" height="140" rx="10" fill="#fff" stroke="#a06820" stroke-width="1"/>
    <text x="890" y="115" text-anchor="middle" font-size="20" font-weight="700" fill="#5e3d10">MCP Client</text>
    <text x="890" y="138" text-anchor="middle" font-size="12" fill="#7a4f15">stdio JSON-RPC</text>
    <line x1="760" y1="155" x2="1020" y2="155" stroke="#fbe8c8"/>
    <text x="890" y="178" text-anchor="middle" font-size="11" fill="#5d5d58">Claude Desktop / Cursor / Cherry</text>
    <text x="890" y="195" text-anchor="middle" font-size="11" fill="#888" font-style="italic">7 个 tool, 跨工具召集</text>
  </g>
</g>

<!-- 箭头 -->
<g>
  <path d="M620 460 L620 510" stroke="#6b6b66" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="640" y="492" font-size="11" fill="#5d5d58" font-style="italic">事件订阅 (单向 · 只读)</text>
</g>

<!-- 运行时层 -->
<g transform="translate(80, 530)">
  <rect x="0" y="0" width="1080" height="320" rx="12" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="20" y="35" font-size="13" font-weight="700" fill="#085041" letter-spacing="3">RUNTIME · 运行时层 · 业务引擎</text>
  <text x="20" y="58" font-size="11" fill="#6b6259">三个进程入口共享同一个引擎 + 同一个事件总线。</text>

  <!-- Three entries -->
  <g>
    <rect x="30" y="80" width="320" height="80" rx="8" fill="#fff" stroke="#0f6e56"/>
    <text x="190" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">bin/council.ts</text>
    <text x="190" y="135" text-anchor="middle" font-size="11" fill="#5d5d58">Commander · 14 个 CLI 命令</text>
  </g>
  <g>
    <rect x="380" y="80" width="320" height="80" rx="8" fill="#fff" stroke="#0f6e56"/>
    <text x="540" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">src/server/live.ts</text>
    <text x="540" y="135" text-anchor="middle" font-size="11" fill="#5d5d58">Bun HTTP+WS · :3737 · 命令总线</text>
  </g>
  <g>
    <rect x="730" y="80" width="320" height="80" rx="8" fill="#fff" stroke="#0f6e56"/>
    <text x="890" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">src/mcp/server.ts</text>
    <text x="890" y="135" text-anchor="middle" font-size="11" fill="#5d5d58">stdio · 7 个 tool · stdout 干净</text>
  </g>

  <!-- Bus -->
  <g>
    <rect x="280" y="190" width="520" height="100" rx="10" fill="#0f6e56" opacity="0.95"/>
    <text x="540" y="225" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">事件总线 events.ts</text>
    <text x="540" y="252" text-anchor="middle" font-size="12" fill="#d6efe5">三种动词 (capture / distill / convene / evolve)</text>
    <text x="540" y="272" text-anchor="middle" font-size="12" fill="#d6efe5">双 sink: NDJSON 文件 (单一真相) + 内存订阅</text>
  </g>

  <!-- entries → bus -->
  <line x1="190" y1="160" x2="370" y2="200" stroke="#0f6e56" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="540" y1="160" x2="540" y2="190" stroke="#0f6e56" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="890" y1="160" x2="710" y2="200" stroke="#0f6e56" stroke-width="1" stroke-dasharray="2 3"/>
</g>

<!-- 箭头 -->
<g>
  <path d="M620 870 L620 920" stroke="#6b6b66" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="640" y="902" font-size="11" fill="#5d5d58" font-style="italic">读写 (业务逻辑层调用)</text>
</g>

<!-- 数据层 -->
<g transform="translate(80, 940)">
  <rect x="0" y="0" width="1080" height="380" rx="12" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="20" y="35" font-size="13" font-weight="700" fill="#0c447c" letter-spacing="3">DATA · 数据层 · 单一真相</text>
  <text x="20" y="58" font-size="11" fill="#6b6259">所有数据是 Markdown + YAML + JSONL。文件系统就是数据库。用户拥有。</text>

  <!-- ~/.council root -->
  <g transform="translate(60, 90)">
    <text x="0" y="20" font-size="14" font-weight="700" font-family="ui-monospace,monospace" fill="#0c447c">~/.council/</text>

    <g font-family="ui-monospace,monospace" font-size="12" fill="#3d3d3a">
      <text x="20" y="50">├── identity.md           <tspan fill="#888"># 你是谁 (你手写)</tspan></text>
      <text x="20" y="74">├── config.yml            <tspan fill="#888"># 模型配置 (默认 Haiku 4.5)</tspan></text>
      <text x="20" y="98">├── personas/</text>
      <text x="40" y="118">│   ├── self/              <tspan fill="#888"># 从你的对话蒸馏 (动态)</tspan></text>
      <text x="40" y="138">│   ├── mentors/           <tspan fill="#888"># Naval / Jobs / Munger (预置)</tspan></text>
      <text x="40" y="158">│   └── roles/             <tspan fill="#888"># 魔鬼代言人 / 第一位用户 (戏剧角色)</tspan></text>
      <text x="20" y="182">├── sessions/             <tspan fill="#888"># 摄入的原始对话</tspan></text>
      <text x="20" y="206">├── skills/               <tspan fill="#888"># 蒸馏出的 highlights (用户原话)</tspan></text>
      <text x="20" y="230">├── transcripts/          <tspan fill="#888"># 议会落档 (人读)</tspan></text>
      <text x="20" y="254">├── live/&lt;run-id&gt;.jsonl   <tspan fill="#888"># 事件流 (单一真相, 可重放)</tspan></text>
      <text x="20" y="278">└── exports/mcp-server/   <tspan fill="#888"># MCP 导出产物</tspan></text>
    </g>
  </g>
</g>

<!-- 底部哲学 -->
<g transform="translate(80, 1370)">
  <rect x="0" y="0" width="1080" height="200" rx="10" fill="#141413"/>

  <text x="540" y="50" text-anchor="middle" font-size="16" font-weight="700" fill="#F6C26B">⚡ 三层解耦的关键</text>

  <g transform="translate(60, 80)">
    <text x="0" y="20" font-size="14" fill="#E8DCC4">·  数据层就是文件系统 — 用户拥有, Git-trackable, 没有数据库</text>
    <text x="0" y="50" font-size="14" fill="#E8DCC4">·  运行时不知道 view 层存在 — 引擎只 emit 事件, 谁订阅谁渲染</text>
    <text x="0" y="80" font-size="14" fill="#E8DCC4">·  view 层只读 — CLI / Web / MCP 三张嘴互不知道, 都从事件总线消费</text>
  </g>

  <text x="540" y="186" text-anchor="middle" font-size="13" font-style="italic" fill="#857e75">
    这就是为什么 CLI 可以是 Git, Web 可以是 GitHub。
  </text>
</g>

<!-- Footer -->
<text x="80" y="1700" font-size="11" fill="#888" font-style="italic">
  npm: @moyu-build/council  ·  github.com/moyu-build/council
</text>

</svg>
