<svg width="100%" viewBox="0 0 1240 1754" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', system-ui, sans-serif">
<title>Council Prompt 链路 · 三链路十节点 (A4 版)</title>

<defs>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a06820" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="1240" height="1754" fill="#fafaf7"/>

<!-- Header -->
<g>
  <text x="80" y="100" font-size="34" font-weight="700" fill="#141413">三链路 · 十节点</text>
  <text x="80" y="138" font-size="15" fill="#5d5d58">Council 的核心 IP 是 prompt 体系。每个节点都有一道明确的 nonsense 守门员。</text>
  <line x1="80" y1="160" x2="1160" y2="160" stroke="#141413" stroke-width="1.5"/>
</g>

<!-- ════════ 链路 1 蒸馏 ════════ -->
<g transform="translate(0, 200)">
  <rect x="80" y="0" width="1080" height="38" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="98" y="25" font-size="15" font-weight="700" fill="#0c447c">链路 1 · DISTILL · 蒸馏</text>
  <text x="280" y="25" font-size="12" fill="#3d3d3a">把对话变成"会说话的你" — 写入 self/</text>

  <!-- input -->
  <rect x="80" y="60" width="120" height="50" rx="8" fill="#fafbfc" stroke="#cdd6df"/>
  <text x="140" y="83" text-anchor="middle" font-size="11" fill="#5d5d58">输入</text>
  <text x="140" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#222">原始对话</text>
  <line x1="200" y1="85" x2="232" y2="85" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

  <!-- P10 -->
  <rect x="232" y="50" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="232" y="50" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="250" y="72" font-size="13" font-weight="700" fill="#0c447c">P10 守门员</text>
  <text x="435" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#185fa5">should-capture</text>
  <text x="342" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">该不该收?</text>
  <text x="342" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">问一句: 这段对话有"用户思</text>
  <text x="342" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">考瞬间"吗? 没有就不收。</text>
  <line x1="252" y1="165" x2="432" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="342" y="184" text-anchor="middle" font-size="10" fill="#a14545">❌ 让 AI 写代码 / 翻译</text>
  <text x="342" y="200" text-anchor="middle" font-size="10" fill="#a14545">❌ 用户全程点头</text>
  <text x="342" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 调试 prompt</text>
  <line x1="452" y1="140" x2="484" y2="140" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

  <!-- P1 -->
  <rect x="484" y="50" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="484" y="50" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="502" y="72" font-size="13" font-weight="700" fill="#0c447c">P1 抠原话</text>
  <text x="687" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#185fa5">identify-highlights</text>
  <text x="594" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">找你的高光</text>
  <text x="594" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">从对话里抠出 3-5 句"真正</text>
  <text x="594" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">属于你的话", 必须逐字引用。</text>
  <line x1="504" y1="165" x2="684" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="594" y="184" text-anchor="middle" font-size="10" fill="#a14545">❌ 用户点头同意 AI</text>
  <text x="594" y="200" text-anchor="middle" font-size="10" fill="#a14545">❌ 同义反复</text>
  <text x="594" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 原话无法逐字定位</text>
  <line x1="704" y1="140" x2="736" y2="140" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

  <!-- P2 -->
  <rect x="736" y="50" width="220" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="736" y="50" width="220" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="754" y="72" font-size="13" font-weight="700" fill="#0c447c">P2 锻造</text>
  <text x="939" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#185fa5">forge-persona</text>
  <text x="846" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">铸造人格</text>
  <text x="846" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">把同类高光熔成会用"我"</text>
  <text x="846" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">说话的角色 (v1)。</text>
  <line x1="756" y1="165" x2="936" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="846" y="184" text-anchor="middle" font-size="10" fill="#a14545">❌ 第三人称</text>
  <text x="846" y="200" text-anchor="middle" font-size="10" fill="#a14545">❌ 编造原话引用</text>
  <text x="846" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 万能修辞</text>
  <line x1="956" y1="140" x2="988" y2="140" stroke="#185fa5" stroke-width="1.6" marker-end="url(#arr-blue)"/>

  <!-- P9 -->
  <rect x="988" y="50" width="172" height="180" rx="10" fill="#fff" stroke="#185fa5" stroke-width="1.4"/>
  <rect x="988" y="50" width="172" height="32" rx="10" fill="#dbeafe" stroke="#185fa5" stroke-width="1.4"/>
  <text x="1006" y="72" font-size="13" font-weight="700" fill="#0c447c">P9 升级</text>
  <text x="1144" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#185fa5">refine-persona</text>
  <text x="1074" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">人格升级</text>
  <text x="1074" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">已有 + 新高光</text>
  <text x="1074" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">v1 升 v2 / v3</text>
  <line x1="1008" y1="165" x2="1140" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="1074" y="184" text-anchor="middle" font-size="10" fill="#1f7a47">✓ reinforce</text>
  <text x="1074" y="200" text-anchor="middle" font-size="10" fill="#1f7a47">✓ enrich</text>
  <text x="1074" y="216" text-anchor="middle" font-size="10" fill="#1f7a47">✓ contradict</text>
</g>

<!-- ════════ 链路 2 议会 ════════ -->
<g transform="translate(0, 700)">
  <rect x="80" y="0" width="1080" height="38" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="98" y="25" font-size="15" font-weight="700" fill="#085041">链路 2 · CONVENE · 议会</text>
  <text x="280" y="25" font-size="12" fill="#3d3d3a">召集 persona 制造对撞 — 读取 self/ + mentors/ + roles/</text>

  <rect x="80" y="60" width="120" height="50" rx="8" fill="#fafbfc" stroke="#cdd6df"/>
  <text x="140" y="83" text-anchor="middle" font-size="11" fill="#5d5d58">输入</text>
  <text x="140" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#222">你的真问题</text>
  <line x1="200" y1="85" x2="232" y2="85" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

  <!-- P3 -->
  <rect x="232" y="50" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="232" y="50" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="250" y="72" font-size="13" font-weight="700" fill="#085041">P3 召集</text>
  <text x="435" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#0f6e56">summon</text>
  <text x="342" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">召集人</text>
  <text x="342" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">从全库 N 个里选 3-5 个上桌。</text>
  <text x="342" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">代码 + LLM 双重保护多样性。</text>
  <line x1="252" y1="165" x2="432" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="342" y="184" text-anchor="middle" font-size="10" fill="#085041">✓ ≥1 self + ≥1 mentor + ≥1 role</text>
  <text x="342" y="200" text-anchor="middle" font-size="10" fill="#085041">✓ devils-advocate 永远在席</text>
  <text x="342" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 单视角 = 回音室</text>
  <line x1="452" y1="140" x2="484" y2="140" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

  <!-- P4 -->
  <rect x="484" y="50" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="484" y="50" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="502" y="72" font-size="13" font-weight="700" fill="#085041">P4 陈述 ⏵⏵ 并行</text>
  <text x="687" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#0f6e56">statement</text>
  <text x="594" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">独立陈述</text>
  <text x="594" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">N 个 persona 同时各自闷头</text>
  <text x="594" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">思考, 不许偷看其他人。</text>
  <line x1="504" y1="165" x2="684" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="594" y="184" text-anchor="middle" font-size="10" fill="#a14545">❌ 串供</text>
  <text x="594" y="200" text-anchor="middle" font-size="10" fill="#a14545">❌ 客套</text>
  <text x="594" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 既要又要</text>
  <line x1="704" y1="140" x2="736" y2="140" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

  <!-- P5 -->
  <rect x="736" y="50" width="220" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="736" y="50" width="220" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="754" y="72" font-size="13" font-weight="700" fill="#085041">P5 质疑 ⏵⏵ 并行</text>
  <text x="939" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#0f6e56">cross-exam</text>
  <text x="846" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">互相质疑</text>
  <text x="846" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">每人挑别人盲点, 提一个对</text>
  <text x="846" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">方必须回答的锋利问题。</text>
  <line x1="756" y1="165" x2="936" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="846" y="184" text-anchor="middle" font-size="10" fill="#a14545">❌ "其实他说得很对…"</text>
  <text x="846" y="200" text-anchor="middle" font-size="10" fill="#a14545">❌ 没有具体抓手</text>
  <text x="846" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 泛泛 "更全面考虑"</text>
  <line x1="956" y1="140" x2="988" y2="140" stroke="#0f6e56" stroke-width="1.6" marker-end="url(#arr-green)"/>

  <!-- P6 -->
  <rect x="988" y="50" width="172" height="180" rx="10" fill="#fff" stroke="#0f6e56" stroke-width="1.4"/>
  <rect x="988" y="50" width="172" height="32" rx="10" fill="#d6efe5" stroke="#0f6e56" stroke-width="1.4"/>
  <text x="1006" y="72" font-size="13" font-weight="700" fill="#085041">P6 综合</text>
  <text x="1144" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#0f6e56">synthesis</text>
  <text x="1074" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">综合裁定</text>
  <text x="1074" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">不属于任何 persona</text>
  <text x="1074" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">JSON 结构化输出</text>
  <line x1="1008" y1="165" x2="1140" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="1074" y="184" text-anchor="middle" font-size="10" fill="#085041">✓ 共识 / 分歧</text>
  <text x="1074" y="200" text-anchor="middle" font-size="10" fill="#085041">✓ 决议 / 元洞察</text>
  <text x="1074" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 综上所述</text>
</g>

<!-- ════════ 链路 3 进化 ════════ -->
<g transform="translate(0, 1180)">
  <rect x="80" y="0" width="1080" height="38" rx="6" fill="#fbf1e1" stroke="#a06820" stroke-width="0.5"/>
  <text x="98" y="25" font-size="15" font-weight="700" fill="#7a4f15">链路 3 · EVOLVE · 进化</text>
  <text x="280" y="25" font-size="12" fill="#3d3d3a">让 persona 库不腐烂 — 归档老的, 升级新的</text>

  <!-- input -->
  <rect x="80" y="60" width="180" height="50" rx="8" fill="#fafbfc" stroke="#cdd6df"/>
  <text x="170" y="83" text-anchor="middle" font-size="11" fill="#5d5d58">输入</text>
  <text x="170" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#222">两个看似很像的 persona</text>
  <line x1="260" y1="85" x2="292" y2="85" stroke="#a06820" stroke-width="1.6" marker-end="url(#arr-amber)"/>

  <!-- P7 -->
  <rect x="292" y="50" width="350" height="180" rx="10" fill="#fff" stroke="#a06820" stroke-width="1.4"/>
  <rect x="292" y="50" width="350" height="32" rx="10" fill="#fbe8c8" stroke="#a06820" stroke-width="1.4"/>
  <text x="310" y="72" font-size="13" font-weight="700" fill="#7a4f15">P7 预检</text>
  <text x="625" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#a06820">merge-check</text>
  <text x="467" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">融合预检</text>
  <text x="467" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">从严判断: 是不是本质上是同一个人?</text>
  <text x="467" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">看触发场景 / 思考路径 / 典型片段是否同构。</text>
  <line x1="312" y1="165" x2="622" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="467" y="184" text-anchor="middle" font-size="10" fill="#1f7a47">overlap 0.85+ → 该合</text>
  <text x="467" y="200" text-anchor="middle" font-size="10" fill="#7a4f15">overlap 0.6-0.85 → 边缘 (用户决定)</text>
  <text x="467" y="216" text-anchor="middle" font-size="10" fill="#a14545">overlap &lt;0.6 → 别合 (保留独立视角)</text>
  <line x1="642" y1="140" x2="674" y2="140" stroke="#a06820" stroke-width="1.6" marker-end="url(#arr-amber)"/>
  <text x="658" y="128" text-anchor="middle" font-size="9" fill="#7a4f15">≥0.85</text>

  <!-- P8 -->
  <rect x="674" y="50" width="486" height="180" rx="10" fill="#fff" stroke="#a06820" stroke-width="1.4"/>
  <rect x="674" y="50" width="486" height="32" rx="10" fill="#fbe8c8" stroke="#a06820" stroke-width="1.4"/>
  <text x="692" y="72" font-size="13" font-weight="700" fill="#7a4f15">P8 融合</text>
  <text x="1142" y="72" text-anchor="end" font-size="9" font-family="ui-monospace,monospace" fill="#a06820">synthesize-merge</text>
  <text x="917" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#141413">融合执行</text>
  <text x="917" y="131" text-anchor="middle" font-size="11" fill="#3d3d3a">不是平均, 是各取最锋利, 删重复。</text>
  <text x="917" y="145" text-anchor="middle" font-size="11" fill="#3d3d3a">老的归档到 _merged/, 新的换名上线。</text>
  <line x1="694" y1="165" x2="1140" y2="165" stroke="#cdd6df" stroke-dasharray="2 3"/>
  <text x="917" y="184" text-anchor="middle" font-size="10" fill="#1f7a47">✓ 典型片段从两源各取 ≥1 条原话</text>
  <text x="917" y="200" text-anchor="middle" font-size="10" fill="#a14545">❌ 平均化合并 (失去锋利感)</text>
  <text x="917" y="216" text-anchor="middle" font-size="10" fill="#a14545">❌ 编造新引用</text>
</g>

<!-- ════════ 底部观察 ════════ -->
<g transform="translate(80, 1480)">
  <rect x="0" y="0" width="1080" height="240" rx="10" fill="#1A1815"/>

  <text x="540" y="50" text-anchor="middle" font-size="16" font-weight="700" fill="#F6C26B">⚡ Council 真正的护城河</text>

  <text x="540" y="100" text-anchor="middle" font-size="22" font-weight="600" fill="#E8DCC4">每个 prompt 的"硬性拒绝清单", 比"产出要求"更详细</text>

  <text x="540" y="138" text-anchor="middle" font-size="12" fill="#a8a299">P10 拒绝工具调用 · P1 拒绝同义反复 · P2 拒绝第三人称 · P4 拒绝串供 · P5 拒绝客套 · P6 拒绝和稀泥</text>

  <line x1="200" y1="160" x2="880" y2="160" stroke="#3a2f26" stroke-dasharray="2 4"/>

  <text x="540" y="190" text-anchor="middle" font-size="15" font-style="italic" fill="#F6E27A">不是技术, 是对"AI 输出腐烂模式"的精确认知。</text>
  <text x="540" y="216" text-anchor="middle" font-size="12" fill="#857e75">Hermes / Evolver 没有这套纪律, 蒸出来的就是 ChatGPT 互相点头。</text>
</g>

</svg>
